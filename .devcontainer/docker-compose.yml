version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        VARIANT: 3.12-bookworm # Updated to Python 3.12
        NODE_VERSION: "lts/*"


    volumes:
      - ..:/workspace:cached
      - ~/.ssh:/home/vscode/.ssh:ro  # For SSH key access

    command: sleep infinity
    user: vscode  # Running as non-root user
    working_dir: /workspace
    # Runs app on the same network as the database container, allows "forwardPorts" in devcontainer.json function.
    # network_mode: service:db

    # Use "forwardPorts" in **devcontainer.json** to forward an app port locally.
    # (Adding the "ports" property to this file will not forward from a Codespace.)
    ports:
      - "33100:33100"
      - "33101:33101"
      - "33102:33102"
      - "33103:33103"
      - "33104:33104"
      - "33105:33105"
      - "33106:33106"
      - "33107:33107"
      - "33200:33200"
    extra_hosts:
      - "host.docker.internal:host-gateway"  
    
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      PIP_CACHE_DIR: /tmp/.pip-cache
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - emqx
      - minio

    networks:
      - mappa-network

  postgres:
    image: postgis/postgis:17-3.4-alpine  # Updated to PostgreSQL 17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../.devcontainer/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_USER: postgres # mapa
      POSTGRES_PASSWORD: postgres # 12345Abc.
      POSTGRES_DB: mapa_test
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    networks:
      - mappa-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine  # Redis 7.2
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - mappa-network
    command: redis-server --requirepass mapa 
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine  # RabbitMQ 3.12 with management plugin
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: mapa
      RABBITMQ_DEFAULT_PASS: mapa
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"  # AMQP
      - "15672:15672"  # Management UI
    networks:
      - mappa-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  emqx:
    image: emqx:5.5.0
    restart: unless-stopped
    ports:
      - "1883:1883"    # MQTT
      - "8084:8084"    # WSS
      - "18083:18083"  # Dashboard
    volumes:
      - emqx-data:/opt/emqx/data
    networks:
      - mappa-network
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx_ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mapa
      MINIO_ROOT_PASSWORD: mapa12345
    ports:
      - "9000:9000"    # API
      - "9001:9001"    # Console
    volumes:
      - minio-data:/data
    networks:
      - mappa-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  emqx-data:
  minio-data:

networks:
  mappa-network:
    driver: bridge