proxy_cache_path /var/cache/nginx keys_zone=terrain_cache:10m max_size=10g inactive=365d use_temp_path=off;

upstream ctod_backend {
    server ctod:5000;
    keepalive 64;
}

# Upstream with keepalive for better performance
server {
    listen 8091 default_server;
    server_name _;

    # Disable gzip compression in Nginx.
    # CTOD handles compression; Nginx double-zipping causes binary corruption.
    gzip off;

    # Define terrain as octet-stream for compatibility
    types {
        application/octet-stream terrain;
    }

    # Increase keepalive for clients
    keepalive_timeout 65;
    keepalive_requests 1000;

    # Optimize buffers for binary terrain tiles
    proxy_buffers 64 16k;
    proxy_buffer_size 64k;
    proxy_busy_buffers_size 128k;

    # Define resolver for dynamic upstreams
    resolver 127.0.0.11 valid=10s ipv6=off;
    
    # High-priority override for Tanzania metadata
    location /terrain/tanzania/layer.json {
        alias /usr/share/nginx/html/tanzania_layer.json;
        add_header Access-Control-Allow-Origin *;
        add_header Content-Type application/json;
    }

    # Regex location for Tanzania tiles to strip query params without using 'if'
    # This avoids Nginx instability under high concurrency
    location ~* ^/terrain/(tanzania/.*\.terrain) {
        rewrite ^/terrain/(.*) /tiles/$1? break;
        proxy_pass http://ctod_backend;
        
        # Optimized Proxy & Cache Settings
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Required for keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding $http_accept_encoding;

        # Increase timeouts for terrain generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Resilience: Retry on backend failure
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Enable disk caching
        proxy_cache terrain_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        
        # Cache Key: Ignore query parameters for better hit rate
        proxy_cache_key "$host$uri";
        
        # Cache Lock: Crucial for high-concurrency requests
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        proxy_cache_lock_age 30s;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        
        # Cache successful responses for a year
        proxy_cache_valid 200 304 365d;
        
        # DO NOT cache errors
        proxy_cache_valid 404 1m;
        proxy_cache_valid 499 500 502 503 504 0s;
        
        # Cache control headers sent to the browser
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Proxy-Cache $upstream_cache_status;
        
        # Ensure CORS is allowed
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # General terrain location
    location /terrain/ {
        rewrite ^/terrain/(.*) /tiles/$1 break;
        proxy_pass http://ctod_backend;
        
        # Optimized Proxy & Cache Settings
        proxy_http_version 1.1;
        proxy_set_header Connection ""; # Required for keepalive
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept-Encoding $http_accept_encoding;

        # Increase timeouts for terrain generation
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;

        # Resilience: Retry on backend failure
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;

        # Enable disk caching
        proxy_cache terrain_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        
        # Cache Key: Ignore query parameters for better hit rate
        proxy_cache_key "$host$uri";

        # Cache Lock
        proxy_cache_lock on;
        proxy_cache_lock_timeout 30s;
        proxy_cache_lock_age 30s;
        proxy_cache_revalidate on;
        proxy_cache_min_uses 1;
        
        # Cache successful responses for a year
        proxy_cache_valid 200 304 365d;
        
        # DO NOT cache errors
        proxy_cache_valid 404 1m;
        proxy_cache_valid 499 500 502 503 504 0s;
        
        # Cache control headers sent to the browser
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Proxy-Cache $upstream_cache_status;
        
        # Ensure CORS is allowed
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location /static_meta/ {
        # Path where layer_meta.json will be mounted
        alias /usr/share/nginx/html/;
    }

    location / {
        return 200 "Nginx is alive at port 8081\n";
    }
}
